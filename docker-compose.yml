version: '3.8'

services:
  db:
    image: postgres:16
    container_name: fintrack-db
    environment:
      POSTGRES_USER: fintrack_user
      POSTGRES_PASSWORD: fintrack_pass
      POSTGRES_DB: fintrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fintrack-network

  backend:
    build: ./backend
    container_name: fintrack-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/fintrack
      DB_USERNAME: fintrack_user
      DB_PASSWORD: fintrack_pass
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - fintrack-network

  frontend:
    build: ./frontend
    container_name: fintrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fintrack-network

volumes:
  postgres_data:

networks:
  fintrack-network:
    driver: bridge